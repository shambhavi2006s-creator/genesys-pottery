{% extends "base.html" %}
{% block body %}
<div class="bg-pottery">
  <div class="overlay">
    <div class="card">
      <div style="text-align:center;font-size:2rem;margin-bottom:0.5rem">🏺 ✨</div>
      <h1>Join the Workshop</h1>
      <p class="subtitle">Create your account and begin your pottery journey!</p>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="POST">
        <input type="text" name="name" placeholder="Your name" required>
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Create a password" required>
        <button class="btn" type="submit">Start Your Pottery Journey 🌿</button>
      </form>
      <div class="link-row">
        Already have an account? <a href="/login">Log in here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
