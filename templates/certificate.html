{% extends "base.html" %}
{% block head %}
<style>
  .cert-page {
    background: url('/static/images/pottery_bg.png') center/cover fixed;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .cert-overlay { background: rgba(232,224,213,0.6); min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .cert-card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 2.5rem;
    max-width: 600px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 50px rgba(100,60,20,0.18);
  }
  .cert-wrapper {
    position: relative;
    width: 100%;
    max-width: 460px;
    margin: 0 auto 2rem;
  }
  .cert-wrapper img {
    width: 100%;
    border-radius: 12px;
    display: block;
    box-shadow: 0 8px 32px rgba(100,60,20,0.2);
  }
  .cert-name-overlay {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: #4a2c0a;
    font-weight: 700;
    text-align: center;
    width: 80%;
    text-shadow: 0 1px 2px rgba(255,255,255,0.5);
  }
  .btn-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-sm {
    padding: 0.7rem 1.4rem; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; border: 2px solid var(--brown-btn); transition: all 0.2s; text-decoration: none;
  }
  .btn-primary { background: var(--brown-btn); color: #fff; }
  .btn-primary:hover { background: var(--brown-dark); }
  .btn-secondary { background: transparent; color: var(--brown-btn); }
  .btn-secondary:hover { background: var(--brown-btn); color: #fff; }
</style>
{% endblock %}
{% block body %}
<div class="cert-page">
  <div class="cert-overlay">
    <div class="cert-card">
      <div class="cert-wrapper anim-scale-in" id="certificate">
        <img src="/static/images/certificate_template.png" alt="Certificate">
        <div class="cert-name-overlay">{{ name }}</div>
      </div>
      <div class="btn-row anim-fade-up delay-3">
        <button class="btn-sm btn-primary" onclick="window.print()">Download Your Certificate 🏆</button>
        <a href="/streak" class="btn-sm btn-secondary">Back to Streak</a>
        <a href="/sell" class="btn-sm btn-secondary">Sell Your Creations</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
